{% extends "base.html" %}
{% block title %}Log Study Session — StudyIQ{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="auth-card p-4 p-md-5 rounded-4">
                <div class="text-center mb-4">
                    <i class="bi bi-journal-plus display-4 text-primary"></i>
                    <h3 class="fw-bold text-white mt-2">Log Study Session</h3>
                    <p class="text-secondary">
                        Record what you studied today
                    </p>
                </div>

                <form method="POST" action="{{ url_for('log_study') }}">

                    <div class="row g-3">
                        <!-- SUBJECT DROPDOWN -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary">Subject</label>
                            <select id="subject_select"
                                    class="form-select bg-dark-input border-secondary text-white"
                                    required>
                                <option value="">Select subject...</option>
                                {% for subject in subjects %}
                                <option value="{{ subject.id }}">
                                    {{ subject.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- TOPIC DROPDOWN (dynamic) -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary">Topic</label>
                            <select name="topic_id" id="topic_select"
                                    class="form-select bg-dark-input border-secondary text-white"
                                    required>
                                <option value="">Select subject first...</option>
                            </select>
                        </div>

                        <!-- QUESTIONS ATTEMPTED -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary">
                                Questions Attempted
                            </label>
                            <input type="number" name="questions_attempted"
                                   class="form-control bg-dark-input border-secondary text-white"
                                   min="0" max="500" placeholder="e.g. 20" required>
                        </div>

                        <!-- CORRECT ANSWERS -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary">
                                Correct Answers
                            </label>
                            <input type="number" name="correct_answers"
                                   class="form-control bg-dark-input border-secondary text-white"
                                   min="0" max="500" placeholder="e.g. 14" required>
                        </div>

                        <!-- DIFFICULTY -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary">Difficulty</label>
                            <select name="difficulty"
                                    class="form-select bg-dark-input border-secondary text-white">
                                <option value="Easy">Easy</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="Hard">Hard</option>
                            </select>
                        </div>

                        <!-- STUDY TIME -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary">
                                Study Time (minutes)
                            </label>
                            <input type="number" name="study_time_minutes"
                                   class="form-control bg-dark-input border-secondary text-white"
                                   min="1" max="600" placeholder="e.g. 45" required>
                        </div>

                        <!-- DATE -->
                        <div class="col-md-6">
                            <label class="form-label text-secondary">
                                Session Date
                            </label>
                            <input type="date" name="session_date"
                                   id="session_date"
                                   class="form-control bg-dark-input border-secondary text-white"
                                   required>
                        </div>

                        <!-- NOTES -->
                        <div class="col-12">
                            <label class="form-label text-secondary">
                                Notes <span class="text-muted">(optional)</span>
                            </label>
                            <textarea name="notes" rows="3"
                                      class="form-control bg-dark-input border-secondary text-white"
                                      placeholder="What did you study? Any key learnings?">
                            </textarea>
                        </div>

                        <!-- SUBMIT -->
                        <div class="col-12 mt-2">
                            <button type="submit"
                                    class="btn btn-primary w-100 py-2 fw-bold">
                                <i class="bi bi-check-circle me-2"></i>
                                Save Study Session
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Set today's date as default
document.getElementById('session_date').valueAsDate = new Date();

// Dynamic topic loading
document.getElementById('subject_select').addEventListener('change', function () {
    const subjectId = this.value;
    const topicSelect = document.getElementById('topic_select');

    topicSelect.innerHTML = '<option value="">Loading...</option>';

    if (!subjectId) {
        topicSelect.innerHTML = '<option value="">Select subject first...</option>';
        return;
    }

    fetch(`/api/topics/${subjectId}`)
        .then(response => response.json())
        .then(topics => {
            topicSelect.innerHTML = '<option value="">Select topic...</option>';
            topics.forEach(topic => {
                const option = document.createElement('option');
                option.value = topic.id;
                option.textContent = topic.name;
                topicSelect.appendChild(option);
            });
        })
        .catch(() => {
            topicSelect.innerHTML = '<option value="">Error loading topics</option>';
        });
});
</script>
{% endblock %}
