{% extends "base.html" %}
{% block title %}Login — StudyIQ{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card p-4 p-md-5 rounded-4">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right display-4 text-primary"></i>
                    <h3 class="fw-bold text-white mt-2">Welcome Back</h3>
                    <p class="text-secondary">Login to see your analytics</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label text-secondary">Email Address</label>
                        <input type="email" name="email"
                               class="form-control bg-dark-input border-secondary text-white"
                               placeholder="your@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Password</label>
                        <input type="password" name="password"
                               class="form-control bg-dark-input border-secondary text-white"
                               placeholder="Your password" required>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input"
                               name="remember" id="remember">
                        <label class="form-check-label text-secondary"
                               for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <hr class="border-secondary my-4">
                <p class="text-center text-secondary mb-0">
                    New here?
                    <a href="{{ url_for('register') }}" class="text-primary">
                        Create a free account
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
