{% extends "base.html" %}
{% block title %}Register — StudyIQ{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card p-4 p-md-5 rounded-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-4 text-primary"></i>
                    <h3 class="fw-bold text-white mt-2">Create Account</h3>
                    <p class="text-secondary">Start tracking your learning journey</p>
                </div>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label text-secondary">Username</label>
                        <input type="text" name="username"
                               class="form-control bg-dark-input border-secondary text-white"
                               placeholder="e.g. riya_cse" required minlength="3">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Email Address</label>
                        <input type="email" name="email"
                               class="form-control bg-dark-input border-secondary text-white"
                               placeholder="your@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Password</label>
                        <input type="password" name="password"
                               class="form-control bg-dark-input border-secondary text-white"
                               placeholder="Minimum 6 characters" required minlength="6">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary">Confirm Password</label>
                        <input type="password" name="confirm_password"
                               class="form-control bg-dark-input border-secondary text-white"
                               placeholder="Repeat your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        <i class="bi bi-rocket-takeoff me-2"></i>Create My Account
                    </button>
                </form>

                <hr class="border-secondary my-4">
                <p class="text-center text-secondary mb-0">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="text-primary">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
